name: Build games manifest

on:
  push:
    branches: [main]
    paths:
      - "games/**"
      - "extra-machines.json"
      - "scripts/build-manifest.js"
      - ".github/workflows/build-manifest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Regenerate games.json
        run: node scripts/build-manifest.js
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain games.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add games.json
            git commit -m "chore: regenerate games.json [auto]"
            git push
          else
            echo "games.json already up to date"
          fi
