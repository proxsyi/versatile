<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Prism — Versatile</title>
<meta name="description" content="Place mirrors to bend a beam of light through every crystal. Each puzzle solved, the next grows.">
<meta name="versatile:tag" content="game">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2307080a'/%3E%3Crect x='6' y='14' width='20' height='3' fill='%23cde85a'/%3E%3C/svg%3E">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#07080a;--ink:#ece8dc;--muted:#8b8e87;--accent:#cde85a;--line:rgba(236,232,220,.16)}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;overflow:hidden;position:fixed;inset:0;-webkit-tap-highlight-color:transparent;overscroll-behavior:none;touch-action:manipulation;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  #c{position:fixed;inset:0;display:block;width:100%;height:100%;cursor:pointer;touch-action:none}
  .hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px clamp(14px,3vw,26px);pointer-events:none;z-index:4}
  .mark{display:flex;align-items:center;gap:9px;letter-spacing:.28em;text-transform:uppercase;font-size:12px}
  .mark .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .stat{text-align:right;font-size:12px;color:var(--muted);line-height:1.7}
  .stat b{color:var(--ink)}
  .goal{position:fixed;left:50%;top:54px;transform:translateX(-50%);font-size:12.5px;color:var(--muted);text-align:center;z-index:4;pointer-events:none}
  .banner{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-size:clamp(20px,5vw,32px);color:var(--accent);text-align:center;opacity:0;transition:opacity .4s;pointer-events:none;z-index:5;text-shadow:0 0 24px rgba(205,232,90,.5)}
  .banner.on{opacity:1}
  .tools{position:fixed;right:14px;bottom:16px;display:flex;gap:8px;z-index:6}
  button{font:inherit;font-size:12.5px;color:var(--ink);background:rgba(20,21,25,.86);border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer}
  button:hover{border-color:var(--accent)}
</style>
</head>
<body>
<canvas id="c" role="img" aria-label="Prism — a light-beam puzzle. Tap empty cells to place and rotate mirrors so the beam passes through every crystal."></canvas>
<div class="hud"><div class="mark"><span class="dot"></span>Prism</div><div class="stat">puzzle <b id="lvl">1</b><br>best <b id="best">0</b></div></div>
<div class="goal" id="goal">Tap cells to place mirrors · light every crystal</div>
<div class="banner" id="banner"></div>
<div class="tools"><button id="clearb">Clear</button><button id="newb">New puzzle</button></div>
<script>
(function(){
  var cv=document.getElementById('c'),ctx=cv.getContext('2d');
  var W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var lvlEl=document.getElementById('lvl'),bestEl=document.getElementById('best'),bannerEl=document.getElementById('banner'),goalEl=document.getElementById('goal');
  var level=1,best=0,cols=6,rows=6,size=0,ox=0,oy=0;
  var grid=[],mirror=[],srcC=0,srcR=0,srcDir=[1,0],crystals=[],won=false;
  try{best=parseInt(localStorage.getItem('versatile:prism:best'))||0;}catch(e){}
  bestEl.textContent=best;
  function idx(x,y){return y*cols+x;}
  function inB(x,y){return x>=0&&y>=0&&x<cols&&y<rows;}
  function resize(){ W=cv.clientWidth||innerWidth;H=cv.clientHeight||innerHeight;cv.width=W*DPR|0;cv.height=H*DPR|0;ctx.setTransform(DPR,0,0,DPR,0,0); fit(); }
  window.addEventListener('resize',resize);
  function fit(){ var aw=W-44,ah=H-150; size=Math.floor(Math.min(aw/cols,ah/rows)); if(size<26)size=26; ox=(W-size*cols)/2; oy=(H-size*rows)/2+24; }
  function cx(x){return ox+x*size+size/2;} function cy(y){return oy+y*size+size/2;}
  function matchMirror(inD,outD){ if(-inD[1]===outD[0]&&-inD[0]===outD[1])return 1; return 2; }
  function gen(n){ var need=Math.min(2+n,7),attempt=0,ok=false;
    while(attempt++<400&&!ok){ cols=rows=Math.min(6+n,11); grid=new Array(cols*rows).fill('empty'); mirror=new Array(cols*rows).fill(0); crystals=[];
      srcR=1+(Math.random()*(rows-2)|0); srcC=0; srcDir=[1,0]; grid[idx(0,srcR)]='source';
      var cxp=0,cyp=srcR,dir=[1,0],visited={}; visited[cxp+','+cyp]=1; var safe=0;
      while(crystals.length<need&&safe++<300){ var nx=cxp+dir[0],ny=cyp+dir[1]; if(!inB(nx,ny)){ break; } if(visited[nx+','+ny]){ break; }
        var turn=Math.random()<0.42; var placed=false;
        if(turn){ var opts=[[-dir[1],dir[0]],[dir[1],-dir[0]]]; var good=[]; for(var o=0;o<2;o++){ var ddx=nx+opts[o][0],ddy=ny+opts[o][1]; if(inB(ddx,ddy)&&!visited[ddx+','+ddy])good.push(opts[o]); } if(good.length){ var nd=good[Math.random()*good.length|0]; mirror[idx(nx,ny)]=matchMirror(dir,nd); grid[idx(nx,ny)]='mirror'; dir=nd; placed=true; } }
        if(!placed){ if(crystals.length<need&&Math.random()<0.55){ grid[idx(nx,ny)]='crystal'; crystals.push(idx(nx,ny)); } else { grid[idx(nx,ny)]='empty'; } }
        visited[nx+','+ny]=1; cxp=nx;cyp=ny;
      }
      ok=crystals.length>=Math.max(2,need-1);
    }
    // hide solution: clear all mirrors, keep source + crystals
    for(var i=0;i<grid.length;i++){ if(grid[i]==='mirror'){grid[i]='empty';} mirror[i]=0; }
    level=n;lvlEl.textContent=n;won=false;bannerEl.classList.remove('on');goalEl.style.opacity='1'; fit();
  }
  function trace(){ var pts=[[cx(srcC),cy(srcR)]],lit={},seen={}; var x=srcC,y=srcR,dx=srcDir[0],dy=srcDir[1],g=0,max=cols*rows*4;
    while(g++<max){ var nx=x+dx,ny=y+dy; if(!inB(nx,ny))break; var key=nx+','+ny+','+dx+','+dy; if(seen[key])break; seen[key]=1; x=nx;y=ny; var id=idx(x,y); if(grid[id]==='crystal')lit[id]=1; var m=mirror[id]; if(m===1){var t=dx;dx=-dy;dy=-t;} else if(m===2){var t2=dx;dx=dy;dy=t2;} pts.push([cx(x),cy(y)]); }
    return {pts:pts,lit:lit}; }
  function checkWin(lit){ if(won)return; for(var i=0;i<crystals.length;i++) if(!lit[crystals[i]])return; won=true; if(level>best){best=level;bestEl.textContent=best;try{localStorage.setItem('versatile:prism:best',best);}catch(e){}} bannerEl.textContent='Solved · puzzle '+level;bannerEl.classList.add('on');goalEl.style.opacity='0'; setTimeout(function(){gen(level+1);},1700); }
  cv.addEventListener('pointerdown',function(e){ if(won)return; var r=cv.getBoundingClientRect(),px=e.clientX-r.left,py=e.clientY-r.top; var gx=Math.floor((px-ox)/size),gy=Math.floor((py-oy)/size); if(!inB(gx,gy))return; var id=idx(gx,gy); if(grid[id]!=='empty')return; mirror[id]=(mirror[id]+1)%3; });
  document.getElementById('clearb').addEventListener('click',function(){ for(var i=0;i<mirror.length;i++)mirror[i]=0; won=false;bannerEl.classList.remove('on');goalEl.style.opacity='1'; });
  document.getElementById('newb').addEventListener('click',function(){ gen(level); });
  function frame(t){ ctx.fillStyle='#07080a';ctx.fillRect(0,0,W,H); var i,x,y;
    // grid
    ctx.strokeStyle='rgba(236,232,220,.07)';ctx.lineWidth=1; for(x=0;x<=cols;x++){ctx.beginPath();ctx.moveTo(ox+x*size,oy);ctx.lineTo(ox+x*size,oy+rows*size);ctx.stroke();} for(y=0;y<=rows;y++){ctx.beginPath();ctx.moveTo(ox,oy+y*size);ctx.lineTo(ox+cols*size,oy+y*size);ctx.stroke();}
    var res=trace();
    // beam
    if(res.pts.length>1){ ctx.strokeStyle='rgba(205,232,90,.9)';ctx.lineWidth=2.4;ctx.lineJoin='round';ctx.lineCap='round'; if(!reduce){ctx.shadowColor='rgba(205,232,90,.7)';ctx.shadowBlur=12;} ctx.beginPath();ctx.moveTo(res.pts[0][0],res.pts[0][1]); for(i=1;i<res.pts.length;i++)ctx.lineTo(res.pts[i][0],res.pts[i][1]); ctx.stroke();ctx.shadowBlur=0; }
    // cells
    for(y=0;y<rows;y++)for(x=0;x<cols;x++){ var id=idx(x,y),mx2=cx(x),my2=cy(y),h=size*0.3; var m=mirror[id];
      if(grid[id]==='source'){ ctx.fillStyle='#ffd97a'; if(!reduce){ctx.shadowColor='#ffd97a';ctx.shadowBlur=14;} ctx.beginPath();ctx.arc(mx2,my2,size*0.2,0,6.2832);ctx.fill();ctx.shadowBlur=0; ctx.strokeStyle='#ffd97a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(mx2,my2);ctx.lineTo(mx2+srcDir[0]*h,my2+srcDir[1]*h);ctx.stroke(); }
      else if(grid[id]==='crystal'){ var on=!!res.lit[id]; ctx.save();ctx.translate(mx2,my2);ctx.rotate(Math.PI/4); var s=size*0.22; if(on){ctx.fillStyle='#cde85a'; if(!reduce){ctx.shadowColor='#cde85a';ctx.shadowBlur=16;} ctx.fillRect(-s,-s,2*s,2*s);} else {ctx.strokeStyle='rgba(205,232,90,.5)';ctx.lineWidth=2;ctx.strokeRect(-s,-s,2*s,2*s);} ctx.restore();ctx.shadowBlur=0; }
      if(m){ ctx.strokeStyle='#dfe3ea';ctx.lineWidth=3;ctx.lineCap='round'; var d=size*0.3; ctx.beginPath(); if(m===1){ctx.moveTo(mx2+d,my2-d);ctx.lineTo(mx2-d,my2+d);} else {ctx.moveTo(mx2-d,my2-d);ctx.lineTo(mx2+d,my2+d);} ctx.stroke(); }
    }
    checkWin(res.lit);
    requestAnimationFrame(frame);
  }
  resize();gen(1);requestAnimationFrame(frame);
})();
</script>
<script>
(function(){ var SLUG='prism',TITLE='Prism',ACC='#cde85a';
  var LINES=['A beam of light leaves the source. Diamonds are crystals you need to light up.','Tap empty cells to drop a mirror; tap again to flip its angle (⁄ → \u005c → off). Bend the beam so it passes through every crystal at once to solve the puzzle.'];
  try{ if(localStorage.getItem('versatile:intro:'+SLUG)) return; }catch(e){}
  var wrap=document.createElement('div'); wrap.setAttribute('role','dialog'); wrap.setAttribute('aria-modal','true'); wrap.setAttribute('aria-label','About '+TITLE);
  wrap.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(5,6,8,.66);backdrop-filter:blur(3px)';
  var card=document.createElement('div'); card.style.cssText='max-width:360px;width:100%;background:rgba(15,16,20,.97);border:1px solid rgba(236,232,220,.16);border-radius:16px;padding:20px 22px;box-shadow:0 24px 70px rgba(0,0,0,.6);color:#ece8dc;font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif';
  card.innerHTML='<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px"><span style="width:10px;height:10px;border-radius:50%;background:'+ACC+';box-shadow:0 0 10px '+ACC+'"></span><b style="font-size:16px">'+TITLE+'</b></div>'+LINES.map(function(l){return '<p style="margin:6px 0;color:#c7c3b8">'+l+'</p>';}).join('')+'<div style="margin-top:14px;font-size:12px;color:#8b8e87">Tap anywhere to start</div>';
  card.addEventListener('click',function(e){e.stopPropagation();}); wrap.appendChild(card);
  function close(){ try{localStorage.setItem('versatile:intro:'+SLUG,'1');}catch(e){} if(wrap.parentNode)wrap.parentNode.removeChild(wrap); }
  wrap.addEventListener('click',close); document.addEventListener('keydown',function k(e){ if(e.key==='Escape'){close();document.removeEventListener('keydown',k);} });
  (document.body||document.documentElement).appendChild(wrap);
})();
</script>
</body>
</html>
