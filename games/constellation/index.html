<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Constellation — Versatile</title>
<meta name="description" content="Connect the stars in order to draw each constellation. Every sky you complete, the next one grows.">
<meta name="versatile:tag" content="game">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2307080a'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23e7b84b'/%3E%3C/svg%3E">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#07080a;--ink:#ece8dc;--muted:#8b8e87;--gold:#e7b84b;--line:rgba(236,232,220,.16)}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;overflow:hidden;position:fixed;inset:0;-webkit-tap-highlight-color:transparent}
  #c{position:fixed;inset:0;display:block;width:100%;height:100%;cursor:pointer;touch-action:none}
  .hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px clamp(14px,3vw,26px);pointer-events:none;z-index:4}
  .mark{display:flex;align-items:center;gap:9px;letter-spacing:.28em;text-transform:uppercase;font-size:12px}
  .mark .dot{width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
  .stat{text-align:right;font-size:12px;color:var(--muted);line-height:1.7}
  .stat b{color:var(--ink)}
  .goal{position:fixed;left:50%;top:54px;transform:translateX(-50%);font-size:12.5px;color:var(--muted);text-align:center;z-index:4;pointer-events:none}
  .banner{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-size:clamp(20px,5vw,34px);color:var(--gold);text-align:center;opacity:0;transition:opacity .4s;pointer-events:none;z-index:5;text-shadow:0 0 24px rgba(231,184,75,.6)}
  .banner.on{opacity:1}
  .tools{position:fixed;right:14px;bottom:16px;display:flex;gap:8px;z-index:6}
  button{font:inherit;font-size:12.5px;color:var(--ink);background:rgba(20,21,25,.86);border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer}
  button:hover{border-color:var(--gold)}
</style>
</head>
<body>
<canvas id="c" role="img" aria-label="Connect the numbered stars in order to complete the constellation."></canvas>
<div class="hud"><div class="mark"><span class="dot"></span>Constellation</div><div class="stat">sky <b id="lvl">5</b> stars<br>best <b id="best">0</b></div></div>
<div class="goal" id="goal">Tap the stars in order · 1 → N</div>
<div class="banner" id="banner"></div>
<div class="tools"><button id="newb">New sky</button></div>
<script>
(function(){
  var cv=document.getElementById('c'),ctx=cv.getContext('2d');
  var W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var GOLD='#e7b84b';
  var lvlEl=document.getElementById('lvl'),bestEl=document.getElementById('best'),bannerEl=document.getElementById('banner'),goalEl=document.getElementById('goal');
  var bg=[],dots=[],level=5,next=0,done=false,t0=0,prevW=0,prevH=0,best=0;
  try{best=parseInt(localStorage.getItem('versatile:constellation:best'))||0;}catch(e){}
  bestEl.textContent=best;
  function resize(){ prevW=W;prevH=H; W=cv.clientWidth||innerWidth;H=cv.clientHeight||innerHeight; cv.width=W*DPR|0;cv.height=H*DPR|0; ctx.setTransform(DPR,0,0,DPR,0,0); if(dots.length&&prevW&&prevH){ var rx=W/prevW,ry=H/prevH; for(var i=0;i<dots.length;i++){dots[i].x*=rx;dots[i].y*=ry;} } }
  window.addEventListener('resize',resize);
  function makeBg(){ bg=[]; for(var i=0;i<90;i++) bg.push({x:Math.random(),y:Math.random(),r:Math.random()*1.2+0.3,p:Math.random()*6.28}); }
  function rnd(a,b){return a+Math.random()*(b-a);}
  function newSky(n){ level=n; lvlEl.textContent=n; dots=[]; var mx=Math.min(W,H),pad=Math.max(54,mx*0.12),minD=mx*0.16,tries=0;
    while(dots.length<n && tries<6000){ tries++; var x=rnd(pad,W-pad),y=rnd(pad+40,H-pad),ok=true; for(var i=0;i<dots.length;i++){ var dx=dots[i].x-x,dy=dots[i].y-y; if(dx*dx+dy*dy<minD*minD){ok=false;break;} } if(ok)dots.push({x:x,y:y,lit:false,pop:0}); }
    next=0;done=false;t0=performance.now();bannerEl.classList.remove('on');goalEl.style.opacity='1';
  }
  var AC=null; function ping(i){ try{ if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)(); var o=AC.createOscillator(),g=AC.createGain(),sc=[392,440,494,587,659,784,880]; o.frequency.value=sc[i%sc.length];o.type='sine'; var t=AC.currentTime; g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.22,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.5); o.connect(g);g.connect(AC.destination);o.start();o.stop(t+0.55); }catch(e){} }
  var wrongT=0;
  function hit(x,y){ if(done)return; var R=Math.max(26,Math.min(W,H)*0.06),bi=-1,bd=R*R,i; for(i=0;i<dots.length;i++){ var dx=dots[i].x-x,dy=dots[i].y-y,d=dx*dx+dy*dy; if(d<bd){bd=d;bi=i;} } if(bi<0)return;
    if(bi===next){ dots[bi].lit=true;dots[bi].pop=1;ping(next);next++; if(next>=dots.length){ done=true; var secs=((performance.now()-t0)/1000).toFixed(1); if(level>best){best=level;bestEl.textContent=best;try{localStorage.setItem('versatile:constellation:best',best);}catch(e){}} bannerEl.textContent='Complete · '+secs+'s'; bannerEl.classList.add('on'); goalEl.style.opacity='0'; setTimeout(function(){newSky(level+1);},1800); } }
    else { wrongT=performance.now(); }
  }
  cv.addEventListener('pointerdown',function(e){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e2){}} var r=cv.getBoundingClientRect(); hit(e.clientX-r.left,e.clientY-r.top); });
  document.getElementById('newb').addEventListener('click',function(){ newSky(level); });
  function frame(t){ ctx.fillStyle='#07080a';ctx.fillRect(0,0,W,H); var i;
    for(i=0;i<bg.length;i++){ var s=bg[i],a=0.25+0.3*Math.sin(t*0.001+s.p); ctx.globalAlpha=a;ctx.fillStyle='#c9ccd6';ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,6.2832);ctx.fill(); }
    ctx.globalAlpha=1;
    ctx.strokeStyle='rgba(231,184,75,.14)';ctx.lineWidth=1;ctx.beginPath(); for(i=0;i<dots.length;i++){ if(i===0)ctx.moveTo(dots[i].x,dots[i].y); else ctx.lineTo(dots[i].x,dots[i].y);} ctx.stroke();
    ctx.strokeStyle=GOLD;ctx.lineWidth=2.2;ctx.lineJoin='round';ctx.beginPath(); for(i=0;i<next;i++){ if(i===0)ctx.moveTo(dots[i].x,dots[i].y); else ctx.lineTo(dots[i].x,dots[i].y);} ctx.stroke();
    var wrongFlash=(performance.now()-wrongT)<260;
    for(i=0;i<dots.length;i++){ var d=dots[i]; d.pop*=0.9; if(d.lit){ ctx.fillStyle=GOLD; if(!reduce){ctx.shadowColor=GOLD;ctx.shadowBlur=10+d.pop*22;} } else { ctx.fillStyle='rgba(236,232,220,.55)';ctx.shadowBlur=0; } ctx.beginPath();ctx.arc(d.x,d.y,5+d.pop*6,0,6.2832);ctx.fill();ctx.shadowBlur=0;
      if(!d.lit){ ctx.fillStyle='rgba(236,232,220,.8)';ctx.font='12px ui-monospace,monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(String(i+1),d.x,d.y-15); }
      if(i===next&&!done){ ctx.strokeStyle=wrongFlash?'rgba(255,90,70,.9)':'rgba(231,184,75,.8)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(d.x,d.y,14+3*Math.sin(t*0.006),0,6.2832);ctx.stroke(); }
    }
    requestAnimationFrame(frame);
  }
  resize();makeBg();newSky(5);requestAnimationFrame(frame);
})();
</script>
<script>
(function(){ var SLUG='constellation',TITLE='Constellation',ACC='#e7b84b';
  var LINES=['Tap the numbered stars in order — 1, 2, 3 … — to trace the constellation.','Finish a sky and the next one grows by a star. How far can you go?'];
  try{ if(localStorage.getItem('versatile:intro:'+SLUG)) return; }catch(e){}
  var wrap=document.createElement('div'); wrap.setAttribute('role','dialog'); wrap.setAttribute('aria-modal','true'); wrap.setAttribute('aria-label','About '+TITLE);
  wrap.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(5,6,8,.66);backdrop-filter:blur(3px)';
  var card=document.createElement('div'); card.style.cssText='max-width:360px;width:100%;background:rgba(15,16,20,.97);border:1px solid rgba(236,232,220,.16);border-radius:16px;padding:20px 22px;box-shadow:0 24px 70px rgba(0,0,0,.6);color:#ece8dc;font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif';
  card.innerHTML='<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px"><span style="width:10px;height:10px;border-radius:50%;background:'+ACC+';box-shadow:0 0 10px '+ACC+'"></span><b style="font-size:16px">'+TITLE+'</b></div>'+LINES.map(function(l){return '<p style="margin:6px 0;color:#c7c3b8">'+l+'</p>';}).join('')+'<div style="margin-top:14px;font-size:12px;color:#8b8e87">Tap anywhere to start</div>';
  card.addEventListener('click',function(e){e.stopPropagation();}); wrap.appendChild(card);
  function close(){ try{localStorage.setItem('versatile:intro:'+SLUG,'1');}catch(e){} if(wrap.parentNode)wrap.parentNode.removeChild(wrap); }
  wrap.addEventListener('click',close); document.addEventListener('keydown',function k(e){ if(e.key==='Escape'){close();document.removeEventListener('keydown',k);} });
  (document.body||document.documentElement).appendChild(wrap);
})();
</script>
</body>
</html>
