<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Constellation — Versatile</title>
<meta name="description" content="A drifting field of stars. Draw lines between them until the whole sky is one constellation.">
<meta name="versatile:tag" content="game">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2307080a'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23e7b84b'/%3E%3C/svg%3E">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#07080a;--ink:#ece8dc;--muted:#8b8e87;--gold:#e7b84b;--line:rgba(236,232,220,.16)}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;overflow:hidden;position:fixed;inset:0;-webkit-tap-highlight-color:transparent}
  #c{position:fixed;inset:0;display:block;width:100%;height:100%;cursor:crosshair;touch-action:none}
  .hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px clamp(14px,3vw,26px);pointer-events:none;z-index:4}
  .mark{display:flex;align-items:center;gap:9px;letter-spacing:.28em;text-transform:uppercase;font-size:12px}
  .mark .dot{width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
  .stat{text-align:right;font-size:12px;color:var(--muted);line-height:1.7}
  .stat b{color:var(--ink)}
  .goal{position:fixed;left:50%;top:54px;transform:translateX(-50%);font-size:12.5px;color:var(--muted);text-align:center;z-index:4;pointer-events:none}
  .banner{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-size:clamp(20px,5vw,34px);color:var(--gold);text-align:center;opacity:0;transition:opacity .4s;pointer-events:none;z-index:5;text-shadow:0 0 24px rgba(231,184,75,.6)}
  .banner.on{opacity:1}
  .tools{position:fixed;right:14px;bottom:16px;display:flex;gap:8px;z-index:6}
  button{font:inherit;font-size:12.5px;color:var(--ink);background:rgba(20,21,25,.86);border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer}
  button:hover{border-color:var(--gold)}
</style>
</head>
<body>
<canvas id="c" role="img" aria-label="Constellation — a drifting field of stars. Drag from one star to a nearby star to link them, until every star is joined into a single constellation."></canvas>
<div class="hud"><div class="mark"><span class="dot"></span>Constellation</div><div class="stat">sky <b id="lvl">1</b><br>best <b id="best">0</b></div></div>
<div class="goal" id="goal">Drag star to star · join them all into one</div>
<div class="banner" id="banner"></div>
<div class="tools"><button id="undob">Undo</button><button id="newb">New sky</button></div>
<script>
(function(){
  var cv=document.getElementById('c'),ctx=cv.getContext('2d');
  var W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var lvlEl=document.getElementById('lvl'),bestEl=document.getElementById('best'),bannerEl=document.getElementById('banner'),goalEl=document.getElementById('goal');
  var stars=[],edges=[],level=1,best=0,dragFrom=-1,mx=0,my=0,won=false,winT=0;
  var GR=26,LR=0,PR=0,bg=[];
  try{best=parseInt(localStorage.getItem('versatile:constellation:best'))||0;}catch(e){}
  bestEl.textContent=best;
  function resize(){ W=cv.clientWidth||innerWidth;H=cv.clientHeight||innerHeight;cv.width=W*DPR|0;cv.height=H*DPR|0;ctx.setTransform(DPR,0,0,DPR,0,0); LR=Math.min(W,H)*0.42;PR=Math.min(W,H)*0.2; bg=[]; for(var i=0;i<90;i++)bg.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.2,t:Math.random()*6.28}); if(!stars.length)newSky(1); else clampStars(); }
  window.addEventListener('resize',resize);
  function clampStars(){ for(var i=0;i<stars.length;i++){ var s=stars[i]; s.x=Math.max(40,Math.min(W-40,s.x)); s.y=Math.max(90,Math.min(H-70,s.y)); } }
  function newSky(n){ level=n;lvlEl.textContent=n; var count=Math.min(6+n,26); stars=[];edges=[];dragFrom=-1;won=false; bannerEl.classList.remove('on');goalEl.style.opacity='1'; for(var i=0;i<count;i++){ var a=0.18+Math.random()*0.6; stars.push({x:60+Math.random()*(W-120),y:110+Math.random()*(H-190),vx:(Math.random()-0.5)*0.18,vy:(Math.random()-0.5)*0.18,tw:Math.random()*6.28,mag:a,r:1.8+Math.random()*1.8}); } }
  function edgeKey(a,b){ return a<b?a+'_'+b:b+'_'+a; }
  function hasEdge(a,b){ var k=edgeKey(a,b); for(var i=0;i<edges.length;i++) if(edgeKey(edges[i][0],edges[i][1])===k) return true; return false; }
  function components(){ var p=[],i; for(i=0;i<stars.length;i++)p.push(i); function f(x){ while(p[x]!==x){p[x]=p[p[x]];x=p[x];} return x; } for(i=0;i<edges.length;i++){ var a=f(edges[i][0]),b=f(edges[i][1]); if(a!==b)p[a]=b; } var roots={},n=0; for(i=0;i<stars.length;i++){ var r=f(i); if(!roots[r]){roots[r]=1;n++;} } return n; }
  function nearest(x,y){ var bi=-1,bd=GR*GR; for(var i=0;i<stars.length;i++){ var dx=stars[i].x-x,dy=stars[i].y-y,d=dx*dx+dy*dy; if(d<bd){bd=d;bi=i;} } return bi; }
  function checkWin(){ if(stars.length>1 && components()===1 && !won){ won=true; if(level>best){best=level;bestEl.textContent=best;try{localStorage.setItem('versatile:constellation:best',best);}catch(e){}} bannerEl.textContent='Constellation complete';bannerEl.classList.add('on');goalEl.style.opacity='0'; winT=performance.now(); setTimeout(function(){newSky(level+1);},1900); } }
  cv.addEventListener('pointerdown',function(e){ var r=cv.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top; mx=x;my=y; dragFrom=nearest(x,y); });
  cv.addEventListener('pointermove',function(e){ var r=cv.getBoundingClientRect(); mx=e.clientX-r.left;my=e.clientY-r.top; });
  function release(){ if(dragFrom>=0){ var t=nearest(mx,my); if(t>=0&&t!==dragFrom){ var dx=stars[t].x-stars[dragFrom].x,dy=stars[t].y-stars[dragFrom].y; if(Math.hypot(dx,dy)<=LR && !hasEdge(dragFrom,t)){ edges.push([dragFrom,t]); checkWin(); } } } dragFrom=-1; }
  cv.addEventListener('pointerup',release); cv.addEventListener('pointercancel',function(){dragFrom=-1;});
  document.getElementById('undob').addEventListener('click',function(){ if(edges.length){edges.pop();won=false;bannerEl.classList.remove('on');goalEl.style.opacity='1';} });
  document.getElementById('newb').addEventListener('click',function(){ newSky(level); });
  function frame(t){ ctx.fillStyle='#07080a';ctx.fillRect(0,0,W,H); var i,j;
    for(i=0;i<bg.length;i++){ var b=bg[i];b.t+=0.01; ctx.globalAlpha=0.18+0.12*Math.sin(b.t); ctx.fillStyle='#cfd3dd'; ctx.fillRect(b.x,b.y,b.r,b.r); }
    ctx.globalAlpha=1;
    if(!won){ for(i=0;i<stars.length;i++){ var s=stars[i]; s.x+=s.vx;s.y+=s.vy; if(s.x<40||s.x>W-40)s.vx*=-1; if(s.y<92||s.y>H-64)s.vy*=-1; s.tw+=0.03; } }
    // proximity ghost lines
    for(i=0;i<stars.length;i++)for(j=i+1;j<stars.length;j++){ var dx=stars[i].x-stars[j].x,dy=stars[i].y-stars[j].y,d=Math.hypot(dx,dy); if(d<PR){ ctx.globalAlpha=(1-d/PR)*0.13; ctx.strokeStyle='#9fb0c8';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(stars[i].x,stars[i].y);ctx.lineTo(stars[j].x,stars[j].y);ctx.stroke(); } }
    ctx.globalAlpha=1;
    // constellation edges
    ctx.strokeStyle=won?'#ffd97a':'#e7b84b';ctx.lineWidth=1.6; if(!reduce){ctx.shadowColor='rgba(231,184,75,.6)';ctx.shadowBlur=8;} for(i=0;i<edges.length;i++){ var a=stars[edges[i][0]],b2=stars[edges[i][1]]; ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b2.x,b2.y);ctx.stroke(); } ctx.shadowBlur=0;
    // drag preview
    if(dragFrom>=0){ var sf=stars[dragFrom],tn=nearest(mx,my),valid=tn>=0&&tn!==dragFrom&&Math.hypot(stars[tn].x-sf.x,stars[tn].y-sf.y)<=LR&&!hasEdge(dragFrom,tn); ctx.strokeStyle=valid?'rgba(231,184,75,.8)':'rgba(236,232,220,.28)';ctx.setLineDash([4,5]);ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(sf.x,sf.y);ctx.lineTo(valid?stars[tn].x:mx,valid?stars[tn].y:my);ctx.stroke();ctx.setLineDash([]); }
    // stars
    for(i=0;i<stars.length;i++){ var st=stars[i],tw=0.7+0.3*Math.sin(st.tw),hot=(i===dragFrom); ctx.fillStyle='rgba('+(hot?'255,230,140':'236,232,220')+','+(st.mag*tw+0.25)+')'; if(!reduce&&hot){ctx.shadowColor='#e7b84b';ctx.shadowBlur=14;} ctx.beginPath();ctx.arc(st.x,st.y,st.r+(hot?1.6:0),0,6.2832);ctx.fill();ctx.shadowBlur=0; }
    requestAnimationFrame(frame);
  }
  resize();requestAnimationFrame(frame);
})();
</script>
<script>
(function(){ var SLUG='constellation',TITLE='Constellation',ACC='#e7b84b';
  var LINES=['Stars drift slowly across the night. Drag from one star to a nearby star to draw a line between them.','Keep linking until every star is joined into a single constellation — then a new, larger sky appears. Undo removes your last line.'];
  try{ if(localStorage.getItem('versatile:intro:'+SLUG)) return; }catch(e){}
  var wrap=document.createElement('div'); wrap.setAttribute('role','dialog'); wrap.setAttribute('aria-modal','true'); wrap.setAttribute('aria-label','About '+TITLE);
  wrap.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(5,6,8,.66);backdrop-filter:blur(3px)';
  var card=document.createElement('div'); card.style.cssText='max-width:360px;width:100%;background:rgba(15,16,20,.97);border:1px solid rgba(236,232,220,.16);border-radius:16px;padding:20px 22px;box-shadow:0 24px 70px rgba(0,0,0,.6);color:#ece8dc;font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif';
  card.innerHTML='<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px"><span style="width:10px;height:10px;border-radius:50%;background:'+ACC+';box-shadow:0 0 10px '+ACC+'"></span><b style="font-size:16px">'+TITLE+'</b></div>'+LINES.map(function(l){return '<p style="margin:6px 0;color:#c7c3b8">'+l+'</p>';}).join('')+'<div style="margin-top:14px;font-size:12px;color:#8b8e87">Tap anywhere to start</div>';
  card.addEventListener('click',function(e){e.stopPropagation();}); wrap.appendChild(card);
  function close(){ try{localStorage.setItem('versatile:intro:'+SLUG,'1');}catch(e){} if(wrap.parentNode)wrap.parentNode.removeChild(wrap); }
  wrap.addEventListener('click',close); document.addEventListener('keydown',function k(e){ if(e.key==='Escape'){close();document.removeEventListener('keydown',k);} });
  (document.body||document.documentElement).appendChild(wrap);
})();
</script>
</body>
</html>
