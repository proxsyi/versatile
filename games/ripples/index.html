<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Echo — Versatile</title>
<meta name="description" content="Watch the lights sing, then echo them back. Each round the melody grows by one.">
<meta name="versatile:tag" content="game">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2305080a'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%236fd6c4'/%3E%3C/svg%3E">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#05080a;--ink:#ece8dc;--muted:#8b8e87;--accent:#6fd6c4;--line:rgba(236,232,220,.16)}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;overflow:hidden;position:fixed;inset:0;-webkit-tap-highlight-color:transparent}
  #c{position:fixed;inset:0;display:block;width:100%;height:100%;cursor:pointer;touch-action:none}
  .hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px clamp(14px,3vw,26px);pointer-events:none;z-index:4}
  .mark{display:flex;align-items:center;gap:9px;letter-spacing:.28em;text-transform:uppercase;font-size:12px}
  .mark .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .stat{text-align:right;font-size:12px;color:var(--muted);line-height:1.7}
  .stat b{color:var(--ink)}
  .goal{position:fixed;left:50%;top:54px;transform:translateX(-50%);font-size:13px;color:var(--muted);text-align:center;z-index:4;pointer-events:none;transition:color .2s}
  .banner{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-size:clamp(18px,4.5vw,30px);color:var(--accent);text-align:center;opacity:0;transition:opacity .4s;pointer-events:none;z-index:5;text-shadow:0 0 24px rgba(111,214,196,.5)}
  .banner.on{opacity:1}
  .tools{position:fixed;right:14px;bottom:16px;display:flex;gap:8px;z-index:6}
  button{font:inherit;font-size:12.5px;color:var(--ink);background:rgba(20,21,25,.86);border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer}
  button:hover{border-color:var(--accent)}
</style>
</head>
<body>
<canvas id="c" role="img" aria-label="Echo — a memory game. Watch the lights flash a melody, then tap them back in the same order."></canvas>
<div class="hud"><div class="mark"><span class="dot"></span>Echo</div><div class="stat">round <b id="round">0</b><br>best <b id="best">0</b></div></div>
<div class="goal" id="goal">Watch, then echo the melody back</div>
<div class="banner" id="banner"></div>
<div class="tools"><button id="startb">Start</button></div>
<script>
(function(){
  var cv=document.getElementById('c'),ctx=cv.getContext('2d');
  var W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var roundEl=document.getElementById('round'),bestEl=document.getElementById('best'),bannerEl=document.getElementById('banner'),goalEl=document.getElementById('goal');
  var pads=[],ripples=[],seq=[],inputIdx=0,state='idle',best=0,showI=0,showT=0;
  try{best=parseInt(localStorage.getItem('versatile:echo:best'))||0;}catch(e){}
  bestEl.textContent=best;
  var N=5, hues=[168,200,52,12,300], freqs=[392,494,587,659,784];
  function resize(){ W=cv.clientWidth||innerWidth;H=cv.clientHeight||innerHeight;cv.width=W*DPR|0;cv.height=H*DPR|0;ctx.setTransform(DPR,0,0,DPR,0,0); layout(); }
  window.addEventListener('resize',resize);
  function layout(){ pads=[]; var cx=W/2,cy=H/2+10,R=Math.min(W,H)*0.30,pr=Math.max(34,Math.min(W,H)*0.085); for(var i=0;i<N;i++){ var a=-Math.PI/2+i*(6.2832/N); pads.push({x:cx+Math.cos(a)*R,y:cy+Math.sin(a)*R,r:pr,hue:hues[i],freq:freqs[i],lit:0}); } }
  var AC=null;
  function tone(i,dur){ try{ if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)(); var o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime; o.frequency.value=pads[i].freq;o.type='triangle'; g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.25,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.45)); o.connect(g);g.connect(AC.destination);o.start();o.stop(t+(dur||0.45)+0.05); }catch(e){} }
  function fire(i){ pads[i].lit=1; ripples.push({x:pads[i].x,y:pads[i].y,r:pads[i].r,life:0,max:900,hue:pads[i].hue}); tone(i); }
  function newGame(){ seq=[];inputIdx=0;state='show';roundEl.textContent='0';bannerEl.classList.remove('on'); addStep(); }
  function addStep(){ seq.push(Math.random()*N|0); roundEl.textContent=seq.length; inputIdx=0; state='show'; showI=0; showT=performance.now()+500; goalEl.textContent='Watch the melody…'; }
  function gameOver(){ state='over'; var reached=seq.length-1; if(reached>best){best=reached;bestEl.textContent=best;try{localStorage.setItem('versatile:echo:best',best);}catch(e){}} bannerEl.textContent='Missed · round '+reached; bannerEl.classList.add('on'); goalEl.textContent='Tap Start to try again'; }
  function tap(x,y){ if(state!=='input')return; for(var i=0;i<pads.length;i++){ var dx=pads[i].x-x,dy=pads[i].y-y; if(dx*dx+dy*dy<=pads[i].r*pads[i].r){ fire(i); if(i===seq[inputIdx]){ inputIdx++; if(inputIdx>=seq.length){ state='ok'; goalEl.textContent='Nice'; setTimeout(addStep,700); } } else { gameOver(); } return; } } }
  cv.addEventListener('pointerdown',function(e){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e2){}} var r=cv.getBoundingClientRect(); tap(e.clientX-r.left,e.clientY-r.top); });
  document.getElementById('startb').addEventListener('click',function(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e2){}} newGame(); });
  function frame(t){
    if(state==='show'){ if(t>=showT){ if(showI<seq.length){ fire(seq[showI]); showI++; showT=t+620; } else { state='input';inputIdx=0;goalEl.textContent='Your turn — echo it back'; } } }
    ctx.fillStyle='#05080a';ctx.fillRect(0,0,W,H); var i;
    for(i=ripples.length-1;i>=0;i--){ var rp=ripples[i];rp.life+=16.67;if(rp.life>rp.max){ripples.splice(i,1);continue;} var p=rp.life/rp.max; ctx.globalAlpha=(1-p)*0.6;ctx.strokeStyle='hsl('+rp.hue+',60%,65%)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(rp.x,rp.y,rp.r+p*Math.min(W,H)*0.4,0,6.2832);ctx.stroke(); }
    ctx.globalAlpha=1;
    for(i=0;i<pads.length;i++){ var pd=pads[i];pd.lit*=0.9; var lit=pd.lit; ctx.fillStyle='hsl('+pd.hue+','+(40+lit*50)+'%,'+(22+lit*45)+'%)'; if(!reduce&&lit>0.05){ctx.shadowColor='hsl('+pd.hue+',70%,60%)';ctx.shadowBlur=10+lit*30;} ctx.beginPath();ctx.arc(pd.x,pd.y,pd.r,0,6.2832);ctx.fill();ctx.shadowBlur=0; ctx.strokeStyle='rgba(236,232,220,.16)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(pd.x,pd.y,pd.r,0,6.2832);ctx.stroke(); }
    requestAnimationFrame(frame);
  }
  resize();requestAnimationFrame(frame);
})();
</script>
<script>
(function(){ var SLUG='ripples',TITLE='Echo',ACC='#6fd6c4';
  var LINES=['The lights flash a melody, one note longer each round. Watch closely.','Then tap the lights back in the exact same order. One slip ends the run — how long a memory can you keep?'];
  try{ if(localStorage.getItem('versatile:intro:'+SLUG)) return; }catch(e){}
  var wrap=document.createElement('div'); wrap.setAttribute('role','dialog'); wrap.setAttribute('aria-modal','true'); wrap.setAttribute('aria-label','About '+TITLE);
  wrap.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(5,6,8,.66);backdrop-filter:blur(3px)';
  var card=document.createElement('div'); card.style.cssText='max-width:360px;width:100%;background:rgba(15,16,20,.97);border:1px solid rgba(236,232,220,.16);border-radius:16px;padding:20px 22px;box-shadow:0 24px 70px rgba(0,0,0,.6);color:#ece8dc;font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif';
  card.innerHTML='<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px"><span style="width:10px;height:10px;border-radius:50%;background:'+ACC+';box-shadow:0 0 10px '+ACC+'"></span><b style="font-size:16px">'+TITLE+'</b></div>'+LINES.map(function(l){return '<p style="margin:6px 0;color:#c7c3b8">'+l+'</p>';}).join('')+'<div style="margin-top:14px;font-size:12px;color:#8b8e87">Tap anywhere to start</div>';
  card.addEventListener('click',function(e){e.stopPropagation();}); wrap.appendChild(card);
  function close(){ try{localStorage.setItem('versatile:intro:'+SLUG,'1');}catch(e){} if(wrap.parentNode)wrap.parentNode.removeChild(wrap); }
  wrap.addEventListener('click',close); document.addEventListener('keydown',function k(e){ if(e.key==='Escape'){close();document.removeEventListener('keydown',k);} });
  (document.body||document.documentElement).appendChild(wrap);
})();
</script>
</body>
</html>
