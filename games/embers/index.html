<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Embers — Versatile</title>
<meta name="description" content="Draw with living fire. Sketch glowing ember lines, or drop in a photo to trace it. Your drawing saves automatically.">
<meta name="versatile:tag" content="draw">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='12' fill='%23ff5a36'/></svg>">
<style>
  :root{ --acc:#ff5a36; --acc2:#ff8a3c; --bg:#07080a; --ink:#ece8dc; --muted:#9a9389; --line:rgba(236,232,220,.16); --panel:rgba(13,14,17,.92); }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:15px/1.45 ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none;cursor:crosshair}
  .hud{position:fixed;top:14px;left:16px;display:flex;align-items:center;gap:10px;font-size:13px;letter-spacing:.04em;color:var(--muted);pointer-events:none;z-index:5}
  .hud .mark{display:flex;align-items:center;gap:7px;color:var(--ink)}
  .hud .dot{width:9px;height:9px;border-radius:50%;background:var(--acc);box-shadow:0 0 10px var(--acc)}
  #saved{font-size:11px;color:var(--muted);opacity:0;transition:opacity .4s}
  #saved.on{opacity:.8}
  .hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);color:var(--muted);font-size:12.5px;text-align:center;pointer-events:none;z-index:5;max-width:92vw}
  .panel{position:fixed;top:50%;left:16px;transform:translateY(-50%);width:230px;max-width:calc(100vw - 32px);background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;z-index:7;backdrop-filter:blur(10px);box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .panel h2{margin:0 0 10px;font-size:13px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;font-weight:600}
  .seg{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
  .seg button{padding:8px 6px;font-size:13px}
  .seg button.active{background:var(--acc);border-color:var(--acc);color:#160a06;font-weight:600}
  button{font:inherit;font-size:13px;color:var(--ink);background:rgba(20,21,25,.86);border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer;backdrop-filter:blur(6px)}
  button:hover{border-color:var(--acc)}
  button:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
  .row{margin:9px 0}
  .row label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px}
  input[type=range]{width:100%;accent-color:var(--acc)}
  .chk{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);margin:8px 0}
  .chk input{accent-color:var(--acc);width:16px;height:16px}
  .acts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:12px}
  .acts .wide{grid-column:1 / -1}
  .tools{position:fixed;right:14px;bottom:16px;display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;z-index:6;max-width:62vw}
  .tools button[aria-pressed=true]{border-color:var(--acc);color:var(--acc)}
  .note{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.4}
  .drop{position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;background:rgba(7,8,10,.82);backdrop-filter:blur(2px)}
  .drop.on{display:flex}
  .drop>div{border:2px dashed var(--acc);border-radius:18px;padding:40px 54px;font-size:17px}
  .toast{position:fixed;left:50%;top:18px;transform:translateX(-50%) translateY(-16px);background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 14px;font-size:13px;z-index:30;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;max-width:88vw;text-align:center}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .sr{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
  @media (max-width:560px){ .panel{top:auto;bottom:74px;transform:none;left:8px;right:8px;width:auto} .tools{left:8px} }
</style>
</head>
<body>
<canvas id="c" aria-label="Embers — draw with glowing ember lines on a dark canvas, or trace a photo. Your drawing saves automatically."></canvas>

<div class="hud"><span class="mark"><i class="dot"></i> Embers</span><span id="saved">saved</span></div>
<div class="hint" id="hint">Drag to draw with fire</div>

<div class="panel">
  <h2>Draw with fire</h2>
  <div class="seg" role="group" aria-label="Tool">
    <button id="toolDraw" class="active" data-tool="draw">Draw</button>
    <button id="toolErase" data-tool="erase">Erase</button>
  </div>
  <label class="chk"><input type="checkbox" id="autochk"> Trace photo edges</label>
  <label class="chk"><input type="checkbox" id="snapchk" checked> Snap to photo edges</label>
  <div class="row"><label>Detail <span id="detailv"></span></label><input type="range" id="detail" min="1" max="100" value="50" aria-label="Detail"></div>
  <div class="row"><label>Density <span id="densityv"></span></label><input type="range" id="density" min="1" max="100" value="60" aria-label="Density"></div>
  <div class="acts">
    <button id="undob">Undo</button>
    <button id="redob">Redo</button>
    <button id="photob">Photo…</button>
    <button id="clearb">Clear</button>
  </div>
  <div class="note" id="note"></div>
</div>

<div class="tools">
  <button id="rainBtn" aria-pressed="false">Rain: off</button>
</div>
<input id="file" type="file" accept="image/*" hidden>

<div class="drop" id="drop"><div>Drop a photo to trace</div></div>
<div class="toast" id="toast" role="status"></div>
<div class="sr" id="live" aria-live="polite"></div>

<script>
(function(){
  'use strict';
  var cv=document.getElementById('c'), ctx=cv.getContext('2d',{alpha:false});
  var detailR=document.getElementById('detail'), densityR=document.getElementById('density');
  var detailV=document.getElementById('detailv'), densityV=document.getElementById('densityv');
  var snapChk=document.getElementById('snapchk'), autoChk=document.getElementById('autochk');
  var fileIn=document.getElementById('file'), toastEl=document.getElementById('toast');
  var dropEl=document.getElementById('drop'), liveEl=document.getElementById('live');
  var rainBtn=document.getElementById('rainBtn'), noteEl=document.getElementById('note');
  var savedEl=document.getElementById('saved'), hintEl=document.getElementById('hint');
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var isMac=/Mac|iPhone|iPad/.test(navigator.platform||navigator.userAgent);
  var UNDO=isMac?'\u2318Z':'Ctrl+Z';
  var SAVE_KEY='versatile:embers:drawing';

  var W=0,H=0,DPR=1, MAXS=460;
  var srcc=document.createElement('canvas'), sctx=srcc.getContext('2d',{willReadFrequently:true});
  var srcW=480,srcH=320, hasPhoto=false, photoData=null;
  var edges=null, removed=null, autoThresh=0.18;
  var tool='draw', strokes=[], current=null, points=[];
  var map={scale:1,ox:0,oy:0};
  var history=[], redoStack=[];

  function clamp(v,a,b){return v<a?a:v>b?b:v;}
  function now(){return performance.now();}
  function toast(m){ toastEl.textContent=m; toastEl.classList.add('on'); liveEl.textContent=m; clearTimeout(toast._t); toast._t=setTimeout(function(){toastEl.classList.remove('on');},2400); }
  function flashSaved(){ savedEl.classList.add('on'); clearTimeout(flashSaved._t); flashSaved._t=setTimeout(function(){savedEl.classList.remove('on');},1100); }

  function resize(){ DPR=Math.min(2,window.devicePixelRatio||1); W=cv.clientWidth||innerWidth; H=cv.clientHeight||innerHeight; cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR); ctx.setTransform(DPR,0,0,DPR,0,0); computeMap(); for(var i=0;i<N;i++){ ptx[i]=SX(points[i][0]); pty[i]=SY(points[i][1]); } }
  window.addEventListener('resize',resize);

  // ---------- mapping ----------
  function computeMap(){ var box=Math.min(W,H)*0.82,s=Math.min(box/srcW,box/srcH); map.scale=s; map.ox=(W-srcW*s)/2; map.oy=(H-srcH*s)/2; }
  function SX(x){return map.ox+x*map.scale;}
  function SY(y){return map.oy+y*map.scale;}
  function toSrc(cx,cy){ var r=cv.getBoundingClientRect(); return {x:(cx-r.left-map.ox)/map.scale, y:(cy-r.top-map.oy)/map.scale}; }

  // ---------- edges (for photo trace + snapping) ----------
  function boxBlur(g,w,h){ var o=new Float32Array(w*h),x,y; for(y=0;y<h;y++)for(x=0;x<w;x++){ var s=0,c=0,dx,dy,xx,yy; for(dy=-1;dy<=1;dy++)for(dx=-1;dx<=1;dx++){ xx=x+dx;yy=y+dy; if(xx>=0&&xx<w&&yy>=0&&yy<h){s+=g[yy*w+xx];c++;} } o[y*w+x]=s/c; } return o; }
  function computeEdges(){
    var w=srcc.width,h=srcc.height,d=sctx.getImageData(0,0,w,h).data,gray=new Float32Array(w*h),i,p;
    for(i=0,p=0;i<w*h;i++,p+=4) gray[i]=0.299*d[p]+0.587*d[p+1]+0.114*d[p+2];
    var bl=boxBlur(gray,w,h),mag=new Float32Array(w*h),gxa=new Float32Array(w*h),gya=new Float32Array(w*h),max=0,x,y;
    for(y=1;y<h-1;y++)for(x=1;x<w-1;x++){ i=y*w+x; var gx=-bl[i-w-1]-2*bl[i-1]-bl[i+w-1]+bl[i-w+1]+2*bl[i+1]+bl[i+w+1]; var gy=-bl[i-w-1]-2*bl[i-w]-bl[i-w+1]+bl[i+w-1]+2*bl[i+w]+bl[i+w+1]; var m=Math.sqrt(gx*gx+gy*gy); mag[i]=m;gxa[i]=gx;gya[i]=gy; if(m>max)max=m; }
    if(max>0) for(i=0;i<mag.length;i++) mag[i]/=max;
    var thin=new Float32Array(w*h);
    for(y=1;y<h-1;y++)for(x=1;x<w-1;x++){ i=y*w+x; var mm=mag[i]; if(mm<0.02){thin[i]=0;continue;} var a=Math.atan2(gya[i],gxa[i]); if(a<0)a+=Math.PI; var dx1,dy1; if(a<0.3927||a>=2.7489){dx1=1;dy1=0;}else if(a<1.1781){dx1=1;dy1=1;}else if(a<1.9635){dx1=0;dy1=1;}else{dx1=-1;dy1=1;} var m1=mag[i+dy1*w+dx1],m2=mag[i-dy1*w-dx1]; thin[i]=(mm>=m1&&mm>=m2)?mm:0; }
    edges={mag:thin,w:w,h:h}; if(!removed||removed.length!==w*h) removed=new Uint8Array(w*h); autoThresh=otsu(thin);
  }
  function otsu(mag){ var bins=64,hist=new Float32Array(bins),i,n=0; for(i=0;i<mag.length;i++){ if(mag[i]<=0.02)continue; hist[(mag[i]*(bins-1))|0]++; n++; } if(!n)return 0.15; var sum=0,j; for(j=0;j<bins;j++)sum+=j*hist[j]; var sumB=0,wB=0,wF=0,mx=0,thr=0; for(j=0;j<bins;j++){ wB+=hist[j]; if(!wB)continue; wF=n-wB; if(!wF)break; sumB+=j*hist[j]; var mB=sumB/wB,mF=(sum-sumB)/wF,bt=wB*wF*(mB-mF)*(mB-mF); if(bt>mx){mx=bt;thr=j;} } return clamp(thr/(bins-1),0.06,0.4); }
  function thresholdFromDetail(){ return clamp(0.45-(detailR.value/100)*0.42,0.03,0.6); }
  function removedAt(x,y){ if(!removed||!edges)return false; var xi=clamp(x|0,0,edges.w-1),yi=clamp(y|0,0,edges.h-1); return removed[yi*edges.w+xi]===1; }

  function snapRadius(){ return Math.max(6,Math.round(Math.min(srcW,srcH)*0.045)); }
  function snapToEdge(x,y){ if(!snapChk.checked||!edges||!hasPhoto) return {x:x,y:y}; var w=edges.w,h=edges.h,mag=edges.mag,r=snapRadius(); var x0=clamp(Math.floor(x-r),1,w-2),x1=clamp(Math.ceil(x+r),1,w-2),y0=clamp(Math.floor(y-r),1,h-2),y1=clamp(Math.ceil(y+r),1,h-2),bx=x,by=y,best=-1,xx,yy; for(yy=y0;yy<=y1;yy++)for(xx=x0;xx<=x1;xx++){ var dx=xx-x,dy=yy-y,dist=Math.sqrt(dx*dx+dy*dy); if(dist>r)continue; var sc=mag[yy*w+xx]*(1-0.4*dist/r); if(sc>best){best=sc;bx=xx;by=yy;} } return best<0.05?{x:x,y:y}:{x:bx,y:by}; }

  // ---------- targets ----------
  function shuffle(a){ for(var i=a.length-1;i>0;i--){var j=Math.random()*(i+1)|0,t=a[i];a[i]=a[j];a[j]=t;} }
  function autoSample(){ var w=edges.w,h=edges.h,mag=edges.mag,t=thresholdFromDetail(),pts=[],x,y,i; for(y=0;y<h;y+=2)for(x=0;x<w;x+=2){ i=y*w+x; if(removed[i])continue; if(mag[i]>=t)pts.push([x,y]); } return pts; }
  function densify(path,closed){ var pts=[],i,n=path.length,sp=2.4; if(n<2)return pts; var lim=closed?n:n-1; for(i=0;i<lim;i++){ var a=path[i],b=path[(i+1)%n],dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy),steps=Math.max(1,Math.round(len/sp)),s; for(s=0;s<steps;s++){var t=s/steps;pts.push([a.x+dx*t,a.y+dy*t]);} } if(!closed){var L=path[n-1];pts.push([L.x,L.y]);} return pts; }
  function computePoints(){ var pts=[],i,j; if(autoChk.checked&&edges&&hasPhoto) pts=autoSample(); var all=strokes.slice(); if(current&&current.pts.length>=2) all.push(current); for(i=0;i<all.length;i++){ var dp=densify(all[i].pts,all[i].closed); for(j=0;j<dp.length;j++){ var q=dp[j]; if(!removedAt(q[0],q[1])) pts.push(q); } } var maxP=Math.round(400+(densityR.value/100)*2000); if(reduce)maxP=Math.min(maxP,900); if(pts.length>maxP){ shuffle(pts); pts.length=maxP; } points=pts; }

  // ---------- particles ----------
  var N=0,px,py,pvx,pvy,ptx,pty,ph,plit,plitT,keyArr=[];
  var prev={};
  function rebuild(reveal){
    var i; prev={}; for(i=0;i<N;i++) prev[keyArr[i]]=[px[i],py[i]];
    computePoints(); computeMap(); N=points.length;
    px=new Float32Array(N);py=new Float32Array(N);pvx=new Float32Array(N);pvy=new Float32Array(N);
    ptx=new Float32Array(N);pty=new Float32Array(N);ph=new Float32Array(N);plit=new Uint8Array(N);plitT=new Float32Array(N);keyArr=new Array(N);
    for(i=0;i<N;i++){ var tx=SX(points[i][0]),ty=SY(points[i][1]); ptx[i]=tx;pty[i]=ty;ph[i]=Math.random();plitT[i]=now(); var key=Math.round(points[i][0])+','+Math.round(points[i][1]); keyArr[i]=key; var pp=prev[key]; if(pp){ px[i]=pp[0];py[i]=pp[1];plit[i]=reveal?0:1; } else if(reveal){ px[i]=tx;py[i]=ty;plit[i]=0; } else { var a=Math.random()*6.283,r=8+Math.random()*16; px[i]=tx+Math.cos(a)*r;py[i]=ty+Math.sin(a)*r;plit[i]=1; } pvx[i]=0;pvy[i]=0; }
    if(reveal){ revealActive=true; litCount=0; buildBuckets(); if(!rainOn) toggleRain(); } else revealActive=false;
    scheduleSave();
  }

  // reveal buckets
  var buckets={},CELL=14,litCount=0,revealActive=false;
  function buildBuckets(){ buckets={}; for(var i=0;i<N;i++){ if(plit[i])continue; var key=((ptx[i]/CELL)|0)+'_'+((pty[i]/CELL)|0); (buckets[key]||(buckets[key]=[])).push(i); } }
  function lightParticle(i){ if(plit[i])return; plit[i]=1;plitT[i]=now();px[i]=ptx[i];py[i]=pty[i];pvx[i]=(Math.random()-0.5)*1.4;pvy[i]=-Math.random()*1.6;litCount++; }
  function lightAll(){ for(var i=0;i<N;i++) if(!plit[i]){plit[i]=1;px[i]=ptx[i];py[i]=pty[i];} litCount=N;revealActive=false; }
  function rainHit(x,y){ var cx=(x/CELL)|0,cy=(y/CELL)|0,ox,oy; for(oy=-1;oy<=1;oy++)for(ox=-1;ox<=1;ox++){ var arr=buckets[(cx+ox)+'_'+(cy+oy)]; if(!arr)continue; for(var k=0;k<arr.length;k++){ var idx=arr[k]; if(plit[idx])continue; var ddx=ptx[idx]-x,ddy=pty[idx]-y; if(ddx*ddx+ddy*ddy<CELL*CELL) lightParticle(idx); } } }

  // ---------- rain ----------
  var rainOn=false,rain=[];
  function initRain(){ rain=[]; var count=reduce?40:(revealActive?200:150),i; for(i=0;i<count;i++) rain.push({x:Math.random()*W,y:Math.random()*H,len:8+Math.random()*22,sp:4.5+Math.random()*7}); }
  function toggleRain(){ rainOn=!rainOn; if(rainOn){ if(!rain.length) initRain(); } else if(revealActive){ lightAll(); } rainBtn.textContent='Rain: '+(rainOn?'on':'off'); rainBtn.setAttribute('aria-pressed',rainOn?'true':'false'); }

  // ---------- history ----------
  function cloneStroke(s){ return {type:s.type,closed:s.closed,pts:s.pts.map(function(p){return {x:p.x,y:p.y};})}; }
  function snapshot(){ return { strokes:strokes.map(cloneStroke), removed:removed?removed.slice(0):null, auto:autoChk.checked }; }
  function pushHistory(){ history.push(snapshot()); if(history.length>60)history.shift(); redoStack.length=0; }
  function restore(s){ strokes=s.strokes.map(cloneStroke); if(s.removed)removed=s.removed.slice(0); autoChk.checked=!!s.auto; current=null; rebuild(false); }
  function undo(){ if(!history.length)return; redoStack.push(snapshot()); restore(history.pop()); toast('Undo'); }
  function redo(){ if(!redoStack.length)return; history.push(snapshot()); restore(redoStack.pop()); toast('Redo'); }

  // ---------- editing ----------
  function eraseAt(x,y){ if(!edges)return; var w=edges.w,h=edges.h,r=Math.max(6,snapRadius()),xx,yy; for(yy=clamp(Math.floor(y-r),0,h-1);yy<=clamp(Math.ceil(y+r),0,h-1);yy++)for(xx=clamp(Math.floor(x-r),0,w-1);xx<=clamp(Math.ceil(x+r),0,w-1);xx++){ var dx=xx-x,dy=yy-y; if(dx*dx+dy*dy<=r*r) removed[yy*w+xx]=1; } }
  function setTool(t){ tool=t; document.getElementById('toolDraw').classList.toggle('active',t==='draw'); document.getElementById('toolErase').classList.toggle('active',t==='erase'); noteEl.innerHTML = t==='draw' ? '<b>Draw:</b> hold and sketch glowing ember lines. With a photo loaded, lines snap to its edges.' : '<b>Erase:</b> drag to wipe embers away. '+UNDO+' to undo.'; }

  // ---------- photo ----------
  function fitImage(img){ var iw=img.naturalWidth||img.width,ih=img.naturalHeight||img.height; if(!iw||!ih){toast('Could not read that image.');return false;} var s=Math.min(MAXS/iw,MAXS/ih,1); srcW=Math.max(2,Math.round(iw*s)); srcH=Math.max(2,Math.round(ih*s)); srcc.width=srcW;srcc.height=srcH; sctx.fillStyle='#000';sctx.fillRect(0,0,srcW,srcH); sctx.drawImage(img,0,0,srcW,srcH); return true; }
  function onPhoto(img){ if(!fitImage(img))return; hasPhoto=true; try{photoData=srcc.toDataURL('image/jpeg',0.72);}catch(e){photoData=null;} computeEdges(); removed=new Uint8Array(srcW*srcH); detailR.value=clamp(Math.round((0.45-autoThresh)/0.42*100),8,92); updateLabels(); pushHistory(); strokes=[]; current=null; autoChk.checked=true; rebuild(rainOn); toast(rainOn?'Rain is painting the photo…':'Photo traced — draw to refine'); }
  function loadFile(f){ if(!f||!/^image\//.test(f.type)){toast('That is not an image file.');return;} var url=URL.createObjectURL(f),img=new Image(); img.onload=function(){try{URL.revokeObjectURL(url);}catch(e){} onPhoto(img);}; img.onerror=function(){try{URL.revokeObjectURL(url);}catch(e){} toast('Could not read that — try a JPG or PNG.');}; img.src=url; }

  // ---------- default scene ----------
  function ridge(arr){ return arr.map(function(p){return {x:p[0],y:p[1]};}); }
  function seedDrawing(){
    srcW=480;srcH=320; srcc.width=srcW;srcc.height=srcH; sctx.fillStyle='#000';sctx.fillRect(0,0,srcW,srcH);
    hasPhoto=false; photoData=null; computeEdges(); removed=new Uint8Array(srcW*srcH); autoChk.checked=false;
    strokes=[];
    var moon=[],cx=378,cy=80,r=34,a; for(a=0;a<6.1;a+=0.18) moon.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}); strokes.push({type:'draw',closed:true,pts:moon});
    strokes.push({type:'draw',closed:false,pts:ridge([[0,206],[64,150],[132,196],[206,116],[286,186],[360,138],[480,196]])});
    strokes.push({type:'draw',closed:false,pts:ridge([[0,272],[88,214],[168,266],[250,196],[332,262],[420,214],[480,258]])});
    [[58,72],[116,46],[196,84],[262,54],[150,112],[316,52]].forEach(function(s){ strokes.push({type:'draw',closed:false,pts:[{x:s[0]-5,y:s[1]},{x:s[0]+5,y:s[1]}]}); strokes.push({type:'draw',closed:false,pts:[{x:s[0],y:s[1]-5},{x:s[0],y:s[1]+5}]}); });
  }

  // ---------- save / load ----------
  function rle(u8){ var out=[],run=0,cur=0,i; for(i=0;i<u8.length;i++){ if(u8[i]===cur){run++;} else {out.push(run);cur=u8[i];run=1;} } out.push(run); return out; }
  function unrle(arr,len){ var u8=new Uint8Array(len),idx=0,cur=0,i,j; for(i=0;i<arr.length;i++){ for(j=0;j<arr[i]&&idx<len;j++) u8[idx++]=cur; cur=cur?0:1; } return u8; }
  function scheduleSave(){ clearTimeout(scheduleSave._t); scheduleSave._t=setTimeout(doSave,450); }
  function doSave(){ try{ var data={v:4,srcW:srcW,srcH:srcH,hasPhoto:hasPhoto,photo:hasPhoto?photoData:null,strokes:strokes,removed:hasPhoto&&removed?rle(removed):null,detail:+detailR.value,density:+densityR.value,auto:autoChk.checked,snap:snapChk.checked}; localStorage.setItem(SAVE_KEY,JSON.stringify(data)); flashSaved(); }catch(e){} }
  function applyState(){ detailR.value=clamp(0,1,1)&&detailR.value; updateLabels(); current=null; rebuild(false); }
  function loadSaved(){
    var raw; try{ raw=localStorage.getItem(SAVE_KEY); }catch(e){ raw=null; }
    if(!raw) return false;
    var d; try{ d=JSON.parse(raw); }catch(e){ return false; }
    if(!d||!d.strokes) return false;
    srcW=d.srcW||480; srcH=d.srcH||320; strokes=d.strokes.map(cloneStroke);
    densityR.value=d.density||60; detailR.value=d.detail||50; autoChk.checked=!!d.auto; snapChk.checked=d.snap!==false;
    function finish(){ updateLabels(); pushHistory(); history.length=0; rebuild(false); }
    if(d.hasPhoto && d.photo){ var img=new Image(); img.onload=function(){ srcc.width=srcW;srcc.height=srcH; sctx.drawImage(img,0,0,srcW,srcH); hasPhoto=true; photoData=d.photo; computeEdges(); removed=d.removed?unrle(d.removed,srcW*srcH):new Uint8Array(srcW*srcH); finish(); }; img.onerror=function(){ seedDrawing(); finish(); }; img.src=d.photo; return true; }
    srcc.width=srcW;srcc.height=srcH; sctx.fillStyle='#000';sctx.fillRect(0,0,srcW,srcH); hasPhoto=false; computeEdges(); removed=new Uint8Array(srcW*srcH); finish(); return true;
  }
  function updateLabels(){ detailV.textContent=detailR.value; densityV.textContent=densityR.value; }

  // ---------- pointer ----------
  var pdown=false;
  cv.addEventListener('pointerdown',function(e){ cv.setPointerCapture&&cv.setPointerCapture(e.pointerId); pdown=true; hintEl.style.opacity='0'; var p=toSrc(e.clientX,e.clientY); pushHistory(); if(tool==='draw'){ var s=snapToEdge(p.x,p.y); current={type:'draw',closed:false,pts:[{x:s.x,y:s.y}]}; } else { eraseAt(p.x,p.y); } });
  cv.addEventListener('pointermove',function(e){ if(!pdown)return; var p=toSrc(e.clientX,e.clientY); if(tool==='draw'&&current){ var s=snapToEdge(p.x,p.y),l=current.pts[current.pts.length-1]; if(!l||Math.abs(l.x-s.x)+Math.abs(l.y-s.y)>1.4) current.pts.push({x:s.x,y:s.y}); } else if(tool==='erase'){ eraseAt(p.x,p.y); } });
  function endStroke(){ if(!pdown)return; pdown=false; if(tool==='draw'&&current){ if(current.pts.length===1){ var p0=current.pts[0]; current.pts.push({x:p0.x+0.6,y:p0.y+0.6}); } if(current.pts.length>=2) strokes.push(current); current=null; } rebuild(false); }
  cv.addEventListener('pointerup',endStroke);
  cv.addEventListener('pointercancel',endStroke);

  // ---------- render ----------
  var last=now();
  function frame(){ var t=now(),dt=t-last; last=t; var dtf=clamp(dt/16.67,0.4,2.2); render(t,dtf); requestAnimationFrame(frame); }
  function render(t,dtf){
    ctx.globalCompositeOperation='source-over'; ctx.fillStyle='rgba(7,8,10,'+(reduce?1:0.2)+')'; ctx.fillRect(0,0,W,H);
    if(hasPhoto){ computeMap(); ctx.globalAlpha=0.16; ctx.drawImage(srcc,map.ox,map.oy,srcW*map.scale,srcH*map.scale); ctx.globalAlpha=1; }
    ctx.globalCompositeOperation='lighter';
    var k=0.045,damp=0.86,i;
    for(i=0;i<N;i++){ if(!plit[i])continue; if(reduce){px[i]=ptx[i];py[i]=pty[i];} else { var ax=(ptx[i]-px[i])*k,ay=(pty[i]-py[i])*k,sh=Math.sin(t*0.002+ph[i]*6.283)*0.10,sv=Math.cos(t*0.0017+ph[i]*5)*0.10; pvx[i]=(pvx[i]+ax)*damp+sh; pvy[i]=(pvy[i]+ay)*damp+sv-0.04; px[i]+=pvx[i]*dtf; py[i]+=pvy[i]*dtf; }
      var spd=Math.sqrt(pvx[i]*pvx[i]+pvy[i]*pvy[i]),sp=clamp(spd*0.22,0,1),pop=clamp((t-plitT[i])/240,0,1);
      ctx.globalAlpha=(0.5+sp*0.5)*(revealActive?pop:1); ctx.fillStyle='hsl('+(10+ph[i]*24+sp*16).toFixed(0)+',100%,'+(30+sp*46).toFixed(0)+'%)';
      var r=(1.0+sp*1.7)*(0.5+pop*0.5); ctx.beginPath(); ctx.arc(px[i],py[i],r,0,6.2832); ctx.fill(); }
    // wet stroke being drawn
    if(current&&current.pts.length){ ctx.globalAlpha=0.9; ctx.strokeStyle='#ff8a3c'; ctx.lineWidth=2; ctx.lineJoin='round'; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(SX(current.pts[0].x),SY(current.pts[0].y)); for(i=1;i<current.pts.length;i++) ctx.lineTo(SX(current.pts[i].x),SY(current.pts[i].y)); ctx.stroke(); }
    if(rainOn){ ctx.lineWidth=1.4; for(i=0;i<rain.length;i++){ var dp=rain[i]; if(!reduce){ dp.y+=dp.sp*dtf; dp.x+=0.6*dtf; if(dp.y>H+dp.len){dp.y=-dp.len;dp.x=Math.random()*W;} } if(revealActive) rainHit(dp.x,dp.y); var gy=ctx.createLinearGradient(dp.x,dp.y,dp.x-2,dp.y-dp.len); gy.addColorStop(0,'rgba(255,150,80,.5)'); gy.addColorStop(1,'rgba(255,90,40,0)'); ctx.strokeStyle=gy; ctx.globalAlpha=0.8; ctx.beginPath(); ctx.moveTo(dp.x,dp.y); ctx.lineTo(dp.x-2,dp.y-dp.len); ctx.stroke(); } if(revealActive&&litCount>=N){revealActive=false;toast('Revealed');} }
    else if(revealActive){ lightAll(); }
    ctx.globalAlpha=1;
  }

  // ---------- wiring ----------
  document.getElementById('toolDraw').addEventListener('click',function(){setTool('draw');});
  document.getElementById('toolErase').addEventListener('click',function(){setTool('erase');});
  document.getElementById('photob').addEventListener('click',function(){fileIn.click();});
  fileIn.addEventListener('change',function(e){ if(e.target.files&&e.target.files[0])loadFile(e.target.files[0]); fileIn.value=''; });
  detailR.addEventListener('input',function(){updateLabels();rebuild(false);});
  densityR.addEventListener('input',function(){updateLabels();rebuild(false);});
  autoChk.addEventListener('change',function(){ if(autoChk.checked&&!hasPhoto){ autoChk.checked=false; toast('Load a photo first to trace edges.'); return; } pushHistory(); rebuild(false); });
  snapChk.addEventListener('change',doSave);
  document.getElementById('undob').addEventListener('click',undo);
  document.getElementById('redob').addEventListener('click',redo);
  rainBtn.addEventListener('click',toggleRain);
  document.getElementById('clearb').addEventListener('click',function(){ pushHistory(); strokes=[]; current=null; if(edges) removed=new Uint8Array(edges.w*edges.h); autoChk.checked=false; rebuild(false); toast('Cleared'); });

  var dragN=0;
  window.addEventListener('dragenter',function(e){e.preventDefault();dragN++;dropEl.classList.add('on');});
  window.addEventListener('dragover',function(e){e.preventDefault();});
  window.addEventListener('dragleave',function(e){e.preventDefault();dragN--;if(dragN<=0){dragN=0;dropEl.classList.remove('on');}});
  window.addEventListener('drop',function(e){e.preventDefault();dragN=0;dropEl.classList.remove('on');var f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];if(f)loadFile(f);});
  window.addEventListener('keydown',function(e){ var k=e.key.toLowerCase(); if((e.metaKey||e.ctrlKey)&&k==='z'){e.preventDefault(); if(e.shiftKey)redo(); else undo(); return;} if((e.metaKey||e.ctrlKey)&&k==='y'){e.preventDefault();redo();return;} if(e.metaKey||e.ctrlKey)return; if(k==='d')setTool('draw'); else if(k==='x')setTool('erase'); else if(k==='u')fileIn.click(); else if(k==='r')toggleRain(); });
  window.addEventListener('beforeunload',doSave);

  updateLabels(); setTool('draw'); resize();
  if(!loadSaved()){ seedDrawing(); updateLabels(); rebuild(false); }
  requestAnimationFrame(frame);
})();
</script>

<script>
(function(){
  var SLUG='embers', TITLE='Embers', ACC='#ff5a36';
  var LINES=['Draw with living fire — hold and drag to sketch glowing ember lines on the dark.','Drop in a photo to trace its edges, toggle rain, or erase. Your drawing saves automatically.'];
  try{ if(localStorage.getItem('versatile:intro:'+SLUG)) return; }catch(e){}
  var wrap=document.createElement('div');
  wrap.setAttribute('role','dialog'); wrap.setAttribute('aria-modal','true'); wrap.setAttribute('aria-label','About '+TITLE);
  wrap.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(5,6,8,.66);backdrop-filter:blur(3px)';
  var card=document.createElement('div');
  card.style.cssText='max-width:360px;width:100%;background:rgba(15,16,20,.97);border:1px solid rgba(236,232,220,.16);border-radius:16px;padding:20px 22px;box-shadow:0 24px 70px rgba(0,0,0,.6);color:#ece8dc;font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif';
  card.innerHTML='<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px"><span style="width:10px;height:10px;border-radius:50%;background:'+ACC+';box-shadow:0 0 10px '+ACC+'"></span><b style="font-size:16px">'+TITLE+'</b></div>'+LINES.map(function(l){return '<p style="margin:6px 0;color:#c7c3b8">'+l+'</p>';}).join('')+'<div style="margin-top:14px;font-size:12px;color:#8b8e87">Tap anywhere to start</div>';
  card.addEventListener('click',function(e){e.stopPropagation();});
  wrap.appendChild(card);
  function close(){ try{localStorage.setItem('versatile:intro:'+SLUG,'1');}catch(e){} if(wrap.parentNode)wrap.parentNode.removeChild(wrap); }
  wrap.addEventListener('click',close);
  document.addEventListener('keydown',function k(e){ if(e.key==='Escape'){close();document.removeEventListener('keydown',k);} });
  (document.body||document.documentElement).appendChild(wrap);
})();
</script>
