<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Wisp — Versatile</title>
<meta name="description" content="Guide a spark of light through a dark maze to the ember. Each maze you solve, the next grows.">
<meta name="versatile:tag" content="game">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%2307080a'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%2390e0c0'/%3E%3C/svg%3E">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#07080a;--ink:#ece8dc;--muted:#8b8e87;--accent:#90e0c0;--ember:#ff8a3c;--line:rgba(236,232,220,.16)}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;overflow:hidden;position:fixed;inset:0;-webkit-tap-highlight-color:transparent}
  #c{position:fixed;inset:0;display:block;width:100%;height:100%;touch-action:none}
  .hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:14px clamp(14px,3vw,26px);pointer-events:none;z-index:4}
  .mark{display:flex;align-items:center;gap:9px;letter-spacing:.28em;text-transform:uppercase;font-size:12px}
  .mark .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}
  .stat{text-align:right;font-size:12px;color:var(--muted);line-height:1.7}
  .stat b{color:var(--ink)}
  .goal{position:fixed;left:50%;top:54px;transform:translateX(-50%);font-size:12.5px;color:var(--muted);text-align:center;z-index:4;pointer-events:none}
  .banner{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);font-size:clamp(20px,5vw,32px);color:var(--ember);text-align:center;opacity:0;transition:opacity .4s;pointer-events:none;z-index:5;text-shadow:0 0 24px rgba(255,138,60,.5)}
  .banner.on{opacity:1}
  .tools{position:fixed;right:14px;bottom:16px;display:flex;gap:8px;z-index:6}
  button{font:inherit;font-size:12.5px;color:var(--ink);background:rgba(20,21,25,.86);border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer}
  button:hover{border-color:var(--accent)}
</style>
</head>
<body>
<canvas id="c" role="img" aria-label="Wisp — guide a spark of light through a dark maze to reach the glowing ember. Use arrow keys or swipe."></canvas>
<div class="hud"><div class="mark"><span class="dot"></span>Wisp</div><div class="stat">maze <b id="lvl">1</b><br>best <b id="best">0</b></div></div>
<div class="goal" id="goal">Swipe or use arrow keys · reach the ember</div>
<div class="banner" id="banner"></div>
<div class="tools"><button id="newb">New maze</button></div>
<script>
(function(){
  var cv=document.getElementById('c'),ctx=cv.getContext('2d');
  var W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  var lvlEl=document.getElementById('lvl'),bestEl=document.getElementById('best'),bannerEl=document.getElementById('banner'),goalEl=document.getElementById('goal');
  var level=1,best=0,cols=8,rows=8,cells=[],cell=0,size=0,ox=0,oy=0;
  var wisp={x:0,y:0},targetCell=0,moving=false,won=false,startT=0;
  try{best=parseInt(localStorage.getItem('versatile:wisp:best'))||0;}catch(e){}
  bestEl.textContent=best;
  function resize(){ W=cv.clientWidth||innerWidth;H=cv.clientHeight||innerHeight;cv.width=W*DPR|0;cv.height=H*DPR|0;ctx.setTransform(DPR,0,0,DPR,0,0); fit(); }
  window.addEventListener('resize',resize);
  function fit(){ var availW=W-40,availH=H-120; size=Math.floor(Math.min(availW/cols,availH/rows)); if(size<14)size=14; ox=(W-size*cols)/2; oy=(H-size*rows)/2+20; if(cells.length){ wisp.x=cellCX(cell); wisp.y=cellCY(cell); } }
  function cellCX(c){ return ox+(c%cols)*size+size/2; }
  function cellCY(c){ return oy+((c/cols)|0)*size+size/2; }
  function gen(){ cells=[]; var i; for(i=0;i<cols*rows;i++) cells.push({n:true,e:true,s:true,w:true,v:false}); var stack=[0]; cells[0].v=true;
    while(stack.length){ var c=stack[stack.length-1],cxx=c%cols,cyy=(c/cols)|0,nb=[];
      if(cyy>0&&!cells[c-cols].v)nb.push([c-cols,'n','s']);
      if(cxx<cols-1&&!cells[c+1].v)nb.push([c+1,'e','w']);
      if(cyy<rows-1&&!cells[c+cols].v)nb.push([c+cols,'s','n']);
      if(cxx>0&&!cells[c-1].v)nb.push([c-1,'w','e']);
      if(nb.length){ var p=nb[Math.random()*nb.length|0]; cells[c][p[1]]=false; cells[p[0]][p[2]]=false; cells[p[0]].v=true; stack.push(p[0]); } else stack.pop();
    }
  }
  function newMaze(n){ level=n;lvlEl.textContent=n; cols=Math.min(7+n,22);rows=Math.min(7+n,22); gen(); cell=0;targetCell=0;moving=false;won=false; fit(); wisp.x=cellCX(0);wisp.y=cellCY(0); startT=performance.now(); bannerEl.classList.remove('on');goalEl.style.opacity='1'; }
  var AC=null; function blip(f){ try{ if(!AC)AC=new (window.AudioContext||window.webkitAudioContext)(); var o=AC.createOscillator(),g=AC.createGain(),t=AC.currentTime;o.frequency.value=f;o.type='sine';g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.15,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+0.18);o.connect(g);g.connect(AC.destination);o.start();o.stop(t+0.2);}catch(e){} }
  function tryMove(dir){ if(won||moving)return; var c=cell,cxx=c%cols,cyy=(c/cols)|0,nc=-1; if(dir==='n'&&!cells[c].n&&cyy>0)nc=c-cols; else if(dir==='s'&&!cells[c].s&&cyy<rows-1)nc=c+cols; else if(dir==='e'&&!cells[c].e&&cxx<cols-1)nc=c+1; else if(dir==='w'&&!cells[c].w&&cxx>0)nc=c-1; if(nc<0)return; cell=nc;targetCell=nc;moving=true; if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} blip(360+Math.random()*80); }
  window.addEventListener('keydown',function(e){ var k=e.key; if(k==='ArrowUp'||k==='w'){tryMove('n');e.preventDefault();} else if(k==='ArrowDown'||k==='s'){tryMove('s');e.preventDefault();} else if(k==='ArrowLeft'||k==='a'){tryMove('w');e.preventDefault();} else if(k==='ArrowRight'||k==='d'){tryMove('e');e.preventDefault();} });
  var sx=0,sy=0,sActive=false;
  cv.addEventListener('pointerdown',function(e){ var r=cv.getBoundingClientRect();sx=e.clientX-r.left;sy=e.clientY-r.top;sActive=true; });
  cv.addEventListener('pointermove',function(e){ if(!sActive)return; var r=cv.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top,dx=x-sx,dy=y-sy,th=Math.max(20,size*0.5); if(Math.abs(dx)>th||Math.abs(dy)>th){ if(Math.abs(dx)>Math.abs(dy)) tryMove(dx>0?'e':'w'); else tryMove(dy>0?'s':'n'); sx=x;sy=y; } });
  cv.addEventListener('pointerup',function(){sActive=false;}); cv.addEventListener('pointercancel',function(){sActive=false;});
  document.getElementById('newb').addEventListener('click',function(){ newMaze(level); });
  function frame(t){ ctx.fillStyle='#07080a';ctx.fillRect(0,0,W,H);
    var tx=cellCX(targetCell),ty=cellCY(targetCell); if(moving){ wisp.x+=(tx-wisp.x)*0.35;wisp.y+=(ty-wisp.y)*0.35; if(Math.abs(tx-wisp.x)<0.6&&Math.abs(ty-wisp.y)<0.6){wisp.x=tx;wisp.y=ty;moving=false; if(cell===cols*rows-1&&!won){ won=true; var secs=((performance.now()-startT)/1000).toFixed(1); if(level>best){best=level;bestEl.textContent=best;try{localStorage.setItem('versatile:wisp:best',best);}catch(e){}} blip(720);blip(900); bannerEl.textContent='Solved · '+secs+'s';bannerEl.classList.add('on');goalEl.style.opacity='0'; setTimeout(function(){newMaze(level+1);},1700); } } }
    var lightR=size*3.4, ex=cellCX(cols*rows-1),ey=cellCY(cols*rows-1);
    // ember beacon (always faint)
    var eg=ctx.createRadialGradient(ex,ey,0,ex,ey,size*0.9); eg.addColorStop(0,'rgba(255,138,60,.9)');eg.addColorStop(1,'rgba(255,138,60,0)'); ctx.fillStyle=eg; ctx.beginPath();ctx.arc(ex,ey,size*0.9,0,6.2832);ctx.fill();
    // walls within light
    ctx.lineCap='round';
    for(var c=0;c<cells.length;c++){ var cxp=ox+(c%cols)*size,cyp=oy+((c/cols)|0)*size,ccx=cxp+size/2,ccy=cyp+size/2; var dd=Math.hypot(ccx-wisp.x,ccy-wisp.y); var al=1-dd/lightR; if(al<=0.02)continue; if(al>1)al=1; ctx.strokeStyle='rgba(144,224,192,'+(0.16+al*0.5)+')'; ctx.lineWidth=2; var cc=cells[c]; ctx.beginPath(); if(cc.n){ctx.moveTo(cxp,cyp);ctx.lineTo(cxp+size,cyp);} if(cc.s){ctx.moveTo(cxp,cyp+size);ctx.lineTo(cxp+size,cyp+size);} if(cc.w){ctx.moveTo(cxp,cyp);ctx.lineTo(cxp,cyp+size);} if(cc.e){ctx.moveTo(cxp+size,cyp);ctx.lineTo(cxp+size,cyp+size);} ctx.stroke(); }
    // light glow around wisp
    var wg=ctx.createRadialGradient(wisp.x,wisp.y,0,wisp.x,wisp.y,lightR); wg.addColorStop(0,'rgba(144,224,192,.10)');wg.addColorStop(1,'rgba(144,224,192,0)'); ctx.fillStyle=wg;ctx.beginPath();ctx.arc(wisp.x,wisp.y,lightR,0,6.2832);ctx.fill();
    // ember core
    ctx.fillStyle='#ff8a3c'; if(!reduce){ctx.shadowColor='#ff8a3c';ctx.shadowBlur=18;} ctx.beginPath();ctx.arc(ex,ey,size*0.2,0,6.2832);ctx.fill();ctx.shadowBlur=0;
    // wisp
    var pulse=size*0.18*(1+0.18*Math.sin(t*0.006)); ctx.fillStyle='#d8fff0'; if(!reduce){ctx.shadowColor='#90e0c0';ctx.shadowBlur=22;} ctx.beginPath();ctx.arc(wisp.x,wisp.y,pulse,0,6.2832);ctx.fill();ctx.shadowBlur=0;
    requestAnimationFrame(frame);
  }
  resize();newMaze(1);requestAnimationFrame(frame);
})();
</script>
<script>
(function(){ var SLUG='wisp',TITLE='Wisp',ACC='#90e0c0';
  var LINES=['You are a spark of light in a dark maze. Swipe (or use arrow keys / WASD) to move.','Your glow only reveals what is near. Find your way to the ember — each maze you solve, the next one grows.'];
  try{ if(localStorage.getItem('versatile:intro:'+SLUG)) return; }catch(e){}
  var wrap=document.createElement('div'); wrap.setAttribute('role','dialog'); wrap.setAttribute('aria-modal','true'); wrap.setAttribute('aria-label','About '+TITLE);
  wrap.style.cssText='position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(5,6,8,.66);backdrop-filter:blur(3px)';
  var card=document.createElement('div'); card.style.cssText='max-width:360px;width:100%;background:rgba(15,16,20,.97);border:1px solid rgba(236,232,220,.16);border-radius:16px;padding:20px 22px;box-shadow:0 24px 70px rgba(0,0,0,.6);color:#ece8dc;font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif';
  card.innerHTML='<div style="display:flex;align-items:center;gap:9px;margin-bottom:10px"><span style="width:10px;height:10px;border-radius:50%;background:'+ACC+';box-shadow:0 0 10px '+ACC+'"></span><b style="font-size:16px">'+TITLE+'</b></div>'+LINES.map(function(l){return '<p style="margin:6px 0;color:#c7c3b8">'+l+'</p>';}).join('')+'<div style="margin-top:14px;font-size:12px;color:#8b8e87">Tap anywhere to start</div>';
  card.addEventListener('click',function(e){e.stopPropagation();}); wrap.appendChild(card);
  function close(){ try{localStorage.setItem('versatile:intro:'+SLUG,'1');}catch(e){} if(wrap.parentNode)wrap.parentNode.removeChild(wrap); }
  wrap.addEventListener('click',close); document.addEventListener('keydown',function k(e){ if(e.key==='Escape'){close();document.removeEventListener('keydown',k);} });
  (document.body||document.documentElement).appendChild(wrap);
})();
</script>
</body>
</html>
